{{- if .Values.infisical.enabled -}}
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: {{ include "clapp.fullname" . }}-infisical
  labels:
    {{- include "clapp.labels" . | nindent 4 }}
spec:
  hostAPI: {{ required "infisical.hostAPI is required when infisical is enabled" .Values.infisical.hostAPI }}
  syncConfig:
    resyncInterval: {{ .Values.infisical.resyncInterval | default "60s" }}
  authentication:
    kubernetesAuth:
      identityId: {{ required "infisical.identityId is required when infisical is enabled" .Values.infisical.identityId }}
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: {{ .Values.infisical.serviceAccountRef.name | default (include "clapp.serviceAccountName" .) }}
        namespace: {{ .Values.infisical.serviceAccountRef.namespace | default .Release.Namespace }}
      secretsScope:
        projectSlug: {{ required "infisical.secretsScope.projectSlug is required when infisical is enabled" .Values.infisical.secretsScope.projectSlug }}
        envSlug: {{ .Values.infisical.secretsScope.envSlug | default "prod" }}
        secretsPath: {{ .Values.infisical.secretsScope.secretsPath | default "/" | quote }}
        recursive: {{ .Values.infisical.secretsScope.recursive | default false }}
  managedKubeSecretReferences:
    - secretName: {{ include "clapp.infisicalSecretName" . }}
      secretNamespace: {{ .Release.Namespace }}
      creationPolicy: {{ .Values.infisical.managedSecret.creationPolicy | default "Orphan" | quote }}
      {{- if .Values.infisical.template.enabled }}
      template:
        includeAllSecrets: {{ .Values.infisical.template.includeAllSecrets | default true }}
        {{- if .Values.infisical.template.data }}
        data:
          {{- range $key, $val := .Values.infisical.template.data }}
          {{ $key }}: {{ $val | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
{{- end }}
